name: Build TPV Ultra Smart V2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev \
          cmake ninja-build

    - name: Install buildozer and cython
      run: |
        pip install buildozer==1.5.0 cython==0.29.37

    - name: Cache buildozer
      uses: actions/cache@v4
      continue-on-error: true
      with:
        path: |
          ~/.buildozer
          ~/.cache/pip
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Setup Android SDK
      run: |
        if [ ! -f ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager ]; then
          export SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK
          curl -L "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdtools.zip
          unzip cmdtools.zip -d /tmp/tmptools
          mkdir -p $SDK/cmdline-tools/latest
          cp -r /tmp/tmptools/cmdline-tools/* $SDK/cmdline-tools/latest/
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          ln -sf $SDK/cmdline-tools/latest/bin/avdmanager $SDK/tools/bin/avdmanager
          export PATH=$PATH:$SDK/cmdline-tools/latest/bin
          yes | sdkmanager --sdk_root=$SDK --licenses || true
          sdkmanager --sdk_root=$SDK "build-tools;33.0.2" "platforms;android-33"
        fi

    - name: Configure Buildozer
      run: |
        if [ -f buildozer.spec ]; then
          echo "android.uses_cleartext_traffic = True" >> buildozer.spec
        fi

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TPV-Ultra-Smart-V2-APK
        path: bin/*.apk
        retention-days: 30
